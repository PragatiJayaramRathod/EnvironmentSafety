<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Safety Dashboard</title>
    <meta name="description" content="A dashboard to report and view environment safety incidents.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header class="glass-panel">
            <h1>Environment Safety <span>Dashboard</span></h1>
            <p>Monitor and report critical environmental incidents in real-time.</p>
        </header>

        <main class="dashboard">
            <section class="report-section glass-panel">
                <h2>Report an Incident</h2>
                <form id="incidentForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required placeholder="e.g. Chemical Spill in River">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" required placeholder="e.g. North Sector">
                    </div>
                    <div class="form-group">
                        <label for="severity">Severity</label>
                        <select id="severity" name="severity">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" required placeholder="Provide details..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Submit Report</button>
                </form>
            </section>

            <section class="incidents-section">
                <h2>Recent Incidents</h2>
                <div id="incidentsGrid" class="incidents-grid">
                    <!-- Incidents will be dynamically loaded here via JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
